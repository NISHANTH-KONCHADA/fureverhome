name: furever_home
description: "FurEver Home — A Flutter pet adoption app connecting loving families with pets in need."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.12.0
  google_fonts: ^6.1.0

  # Utilities
  speech_to_text: ^7.3.0
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0
  http: ^1.2.2
  image_picker: ^1.1.2
  webview_flutter: ^4.9.0

  # Firebase Core & Services
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  firebase_app_check: ^0.4.1+2
  firebase_storage: ^13.0.4
  google_sign_in: ^7.2.0

  # Media
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/sounds/

  fonts:
    - family: Boyers
      fonts:
        - asset: assets/fonts/Boyers-Regular-BF656d77750b513.otf